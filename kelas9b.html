<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KELAS IX F</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050816;
    font-family:Arial, sans-serif;
    color:#00eaff;
    padding:25px 15px;
}

/* CONTAINER */
.container{
    max-width:420px;
    margin:auto;
    text-align:center;
}

/* JUDUL */
h1{
    font-size:28px;
    margin-bottom:25px;
    text-shadow:0 0 15px #00eaff;
    line-height:1.4;
}

/* FOTO */
.card-foto{
    margin-bottom:25px;
}

.foto{
    width:100%;
    border-radius:20px;
    border:3px solid #00eaff;
    box-shadow:
    0 0 10px #00eaff,
    0 0 25px #00eaff;
}

/* NAMA KELAS */
.nama-kelas{
    font-size:24px;
    font-weight:bold;
    margin-bottom:25px;
    text-shadow:0 0 12px #00eaff;
}

/* BOX */
.box{
    background:#081020;
    border:2px solid #00eaff;
    border-radius:22px;
    padding:22px;
    margin-bottom:25px;
    box-shadow:
    0 0 10px #00eaff,
    0 0 20px rgba(0,234,255,0.5);
}

/* JUDUL BOX */
.box h2{
    font-size:30px;
    margin-bottom:20px;
    text-shadow:0 0 10px #00eaff;
}

/* DATA */
.data{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    margin:14px 0;
    text-align:left;
}

/* STRUKTUR */
.struktur-item{
    background:#0d1a2d;
    border-left:4px solid #00eaff;
    border-radius:12px;
    padding:14px;
    margin-bottom:14px;
    text-align:left;
    font-size:18px;
    box-shadow:0 0 8px rgba(0,234,255,0.3);
}

/* BUTTON */
button{
    width:100%;
    padding:15px;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:15px;
    background:#00eaff;
    color:#000;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 15px #00eaff;
}

button:hover{
    transform:scale(1.03);
}

a{
    text-decoration:none;
}

/* RESPONSIVE */
@media(max-width:480px){

    h1{
        font-size:23px;
    }

    .box h2{
        font-size:24px;
    }

    .data{
        font-size:18px;
    }

    .struktur-item{
        font-size:16px;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- JUDUL -->
    <h1>
        WELCOME TO MEMORIES SMP NU
    </h1>

    <!-- FOTO -->
    <div class="card-foto">
        <img src="9a.jpg" class="foto">
    </div>

    <!-- NAMA -->
    <div class="nama-kelas">
        CLASS IX B ✨
    </div>

    <!-- DATA -->
    <div class="box">

        <h2>Data Murid</h2>

        <div class="data">
            👦 Jumlah Laki-laki : <b>18</b>
        </div>

        <div class="data">
            👧 Jumlah Perempuan : <b>15</b>
        </div>

        <div class="data">
            👥 Total Murid : <b>33</b>
        </div>

    </div>

    <!-- STRUKTUR -->
    <div class="box">

        <h2>Struktur Kelas</h2>

        <div class="struktur-item">
            👨‍🏫 <b>Wali Kelas</b><br>
            gatau
        </div>

        <div class="struktur-item">
            👑 <b>Ketua Kelas</b><br>
            gatau
        </div>

        <div class="struktur-item">
            ⭐ <b>Wakil Ketua</b><br>
            gatau
        </div>

        <div class="struktur-item">
            📝 <b>Sekretaris 1</b><br>
            gatau
        </div>

        <div class="struktur-item">
            📝 <b>Sekretaris 2</b><br>
            gatau
        </div>

        <div class="struktur-item">
            💰 <b>Bendahara 1</b><br>
            gatau
        </div>

        <div class="struktur-item">
            💰 <b>Bendahara 2</b><br>
            gatau
        </div>

    </div>

    <!-- BUTTON -->
    <a href="halaman3.html">
        <button>Kembali</button>
    </a>

</div>

</body>
</html>
